<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kasino Web</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
    }

    #stage {
      aspect-ratio: 1080 / 1920;
      width: min(100vw, calc(100vh * 1080 / 1920));
      height: min(100vh, calc(100vw * 1920 / 1080));
      background: black;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas
      id="canvas"
      width="1080"
      height="1920"
      oncontextmenu="event.preventDefault()"></canvas>
  </div>
  <script async type="text/javascript" src="kasino.js"></script>
</body>
</html>
