<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kasino Web</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
    }

    #stage {
      position: relative;
      aspect-ratio: 1080 / 1920;
      width: min(100vw, calc(100dvh * 1080 / 1920));
      height: min(100dvh, calc(100vw * 1920 / 1080));
      max-width: 100vw;
      max-height: 100dvh;
      background: black;
      overflow: hidden;
    }

    @supports not (height: 100dvh) {
      #stage {
        width: min(100vw, calc(100vh * 1080 / 1920));
        height: min(100vh, calc(100vw * 1920 / 1080));
        max-width: 100vw;
        max-height: 100vh;
      }
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: black;
    }

    #overlay-root {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .rive-overlay {
      position: absolute;
      display: block;
      pointer-events: auto;
      touch-action: none;
      background: transparent;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: black;
      color: white;
      font-family: sans-serif;
      z-index: 10;
    }

    #loading.hidden {
      display: none;
    }

    #loading-inner {
      width: min(72%, 420px);
      text-align: center;
    }

    #loading-text {
      margin-bottom: 14px;
      font-size: 16px;
      line-height: 1.4;
      opacity: 0.95;
    }

    #loading-bar-wrap {
      width: 100%;
      height: 12px;
      background: rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      overflow: hidden;
    }

    #loading-bar-fill {
      width: 0%;
      height: 100%;
      background: rgba(255, 255, 255, 0.92);
      transform-origin: left center;
    }

    #loading-detail {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.72;
      min-height: 1.2em;
    }

    #version-badge {
      position: absolute;
      right: 10px;
      bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 20;
      font-family: sans-serif;
      font-size: 11px;
      line-height: 1;
      color: rgba(255, 255, 255, 0.75);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>

<body>
  <div id="stage">
    <canvas
      id="canvas"
      width="1080"
      height="1920"
      oncontextmenu="event.preventDefault()"></canvas>

    <div id="overlay-root"></div>

    <div id="loading">
      <div id="loading-inner">
        <div id="loading-text">Loading…</div>
        <div id="loading-bar-wrap">
          <div id="loading-bar-fill"></div>
        </div>
        <div id="loading-detail"></div>
      </div>
    </div>

    <div id="version-badge">Version: 138dd33</div>
  </div>

  <script src="https://unpkg.com/@rive-app/canvas"></script>

  <script>
    (function () {
      const WASM_NAME = "kasino.138dd33.wasm";
      const DESIGN_W = 1080;
      const DESIGN_H = 1920;

      const stageEl = document.getElementById("stage");
      const sdlCanvas = document.getElementById("canvas");

      const loadingEl = document.getElementById("loading");
      const loadingTextEl = document.getElementById("loading-text");
      const loadingBarFillEl = document.getElementById("loading-bar-fill");
      const loadingDetailEl = document.getElementById("loading-detail");

      let runtimeReady = false;
      let fakePercent = 0;
      let realPercent = 0;
      let targetPercent = 0;
      let rafId = 0;
      let dependenciesTotal = 0;

      let startButtonOverlay = null;

      // pointerId -> { owner: "rive" | "sdl", overlay }
      const activePointers = new Map();

      function setLoadingText(text) {
        loadingTextEl.textContent = text || "Loading…";
      }

      function setLoadingDetail(text) {
        loadingDetailEl.textContent = text || "";
      }

      function setBarPercent(percent) {
        const clamped = Math.max(0, Math.min(100, percent));
        loadingBarFillEl.style.width = clamped.toFixed(1) + "%";
      }

      function easeTowards(current, target) {
        const diff = target - current;
        if (Math.abs(diff) < 0.08) return target;
        return current + diff * 0.08;
      }

      function tickProgress() {
        if (!runtimeReady) {
          const ceiling = 90;
          const desired = Math.max(realPercent, Math.min(ceiling, targetPercent));

          fakePercent = easeTowards(fakePercent, desired);

          if (fakePercent < ceiling) fakePercent += 0.18;
          if (fakePercent > ceiling) fakePercent = ceiling;

          setBarPercent(fakePercent);

          if (dependenciesTotal > 0) {
            setLoadingText(`Loading… ${Math.round(fakePercent)}%`);
          } else {
            setLoadingText("Loading…");
          }

          rafId = requestAnimationFrame(tickProgress);
          return;
        }

        fakePercent = easeTowards(fakePercent, 100);
        if (fakePercent > 99.92) fakePercent = 100;

        setBarPercent(fakePercent);
        setLoadingText(fakePercent >= 100 ? "Ready" : `Starting… ${Math.round(fakePercent)}%`);

        if (fakePercent < 100) {
          rafId = requestAnimationFrame(tickProgress);
        } else {
          loadingEl.classList.add("hidden");
        }
      }

      function ensureProgressLoop() {
        if (!rafId) {
          rafId = requestAnimationFrame(tickProgress);
        }
      }

      function getStageRect() {
        return stageEl.getBoundingClientRect();
      }

      function logicalToCssRect(x, y, w, h) {
        const r = getStageRect();
        return {
          left: (x / DESIGN_W) * r.width,
          top: (y / DESIGN_H) * r.height,
          width: (w / DESIGN_W) * r.width,
          height: (h / DESIGN_H) * r.height
        };
      }

      function callC(name, returnType = null, argTypes = [], args = []) {
        if (window.Module && typeof Module.ccall === "function") {
          try {
            return Module.ccall(name, returnType, argTypes, args);
          } catch (err) {
            console.warn("Module.ccall failed:", name, err);
            return undefined;
          }
        }
        return undefined;
      }

      function refreshRiveOverlayLayout(overlay) {
        if (!overlay) return;

        const rect = logicalToCssRect(overlay.x, overlay.y, overlay.w, overlay.h);
        overlay.canvas.style.left = rect.left + "px";
        overlay.canvas.style.top = rect.top + "px";
        overlay.canvas.style.width = rect.width + "px";
        overlay.canvas.style.height = rect.height + "px";

        const dpr = window.devicePixelRatio || 1;
        const internalW = Math.max(1, Math.round(rect.width * dpr));
        const internalH = Math.max(1, Math.round(rect.height * dpr));

        if (overlay.canvas.width !== internalW) overlay.canvas.width = internalW;
        if (overlay.canvas.height !== internalH) overlay.canvas.height = internalH;

        if (overlay.rive) {
          overlay.rive.resizeDrawingSurfaceToCanvas();
        }
      }

      function cssEventToCanvasPixel(canvas, clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        if (rect.width <= 0 || rect.height <= 0) return null;

        const x = ((clientX - rect.left) / rect.width) * canvas.width;
        const y = ((clientY - rect.top) / rect.height) * canvas.height;

        return {
          x: Math.floor(x),
          y: Math.floor(y)
        };
      }

      function isOpaqueAtClientPoint(canvas, clientX, clientY, alphaThreshold = 1) {
        const p = cssEventToCanvasPixel(canvas, clientX, clientY);
        if (!p) return false;
        if (p.x < 0 || p.y < 0 || p.x >= canvas.width || p.y >= canvas.height) return false;

        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        if (!ctx) return true;

        try {
          const pixel = ctx.getImageData(p.x, p.y, 1, 1).data;
          return pixel[3] >= alphaThreshold;
        } catch (e) {
          return true;
        }
      }

      function pointInsideOverlayCssRect(overlay, clientX, clientY) {
        if (!overlay || !overlay.canvas) return false;

        const rect = overlay.canvas.getBoundingClientRect();
        return (
          clientX >= rect.left &&
          clientX < rect.right &&
          clientY >= rect.top &&
          clientY < rect.bottom
        );
      }

      function clientToLogical(clientX, clientY) {
        const rect = sdlCanvas.getBoundingClientRect();
        if (rect.width <= 0 || rect.height <= 0) {
          return { x: 0, y: 0 };
        }

        const nx = (clientX - rect.left) / rect.width;
        const ny = (clientY - rect.top) / rect.height;

        return {
          x: Math.max(0, Math.min(DESIGN_W - 1, Math.round(nx * DESIGN_W))),
          y: Math.max(0, Math.min(DESIGN_H - 1, Math.round(ny * DESIGN_H)))
        };
      }

      function clonePointerEvent(type, ev) {
        return new PointerEvent(type, {
          bubbles: true,
          cancelable: true,
          composed: true,
          pointerId: ev.pointerId,
          pointerType: ev.pointerType,
          isPrimary: ev.isPrimary,
          clientX: ev.clientX,
          clientY: ev.clientY,
          screenX: ev.screenX,
          screenY: ev.screenY,
          button: ev.button,
          buttons: ev.buttons,
          pressure: ev.pressure,
          tangentialPressure: ev.tangentialPressure,
          width: ev.width,
          height: ev.height,
          tiltX: ev.tiltX,
          tiltY: ev.tiltY,
          twist: ev.twist,
          ctrlKey: ev.ctrlKey,
          shiftKey: ev.shiftKey,
          altKey: ev.altKey,
          metaKey: ev.metaKey
        });
      }

      function dispatchDomFallbackToSDL(overlayCanvas, ev) {
        const prev = overlayCanvas.style.pointerEvents;
        overlayCanvas.style.pointerEvents = "none";
        const target = document.elementFromPoint(ev.clientX, ev.clientY) || sdlCanvas;
        overlayCanvas.style.pointerEvents = prev;

        if (!target) return false;

        try {
          return target.dispatchEvent(clonePointerEvent(ev.type, ev));
        } catch (err) {
          console.warn("DOM fallback dispatch failed:", err);
          return false;
        }
      }

      function forwardToSDLViaBridge(type, ev, overlayCanvas) {
        const p = clientToLogical(ev.clientX, ev.clientY);

        const fnMap = {
          pointerdown: "OverlayPointerDown",
          pointermove: "OverlayPointerMove",
          pointerup: "OverlayPointerUp",
          pointercancel: "OverlayPointerCancel"
        };

        const fn = fnMap[type];
        if (!fn) return false;

        if (!(window.Module && typeof Module.ccall === "function")) {
          return dispatchDomFallbackToSDL(overlayCanvas, ev);
        }

        try {
          if (type === "pointerdown") {
            const ok = callC(fn, "number", ["number", "number", "number", "number"], [p.x, p.y, ev.pointerId, ev.button]);
            if (ok === 1) return true;
          }

          if (type === "pointermove") {
            const ok = callC(fn, "number", ["number", "number", "number", "number"], [p.x, p.y, ev.pointerId, ev.buttons]);
            if (ok === 1) return true;
          }

          if (type === "pointerup") {
            const ok = callC(fn, "number", ["number", "number", "number", "number"], [p.x, p.y, ev.pointerId, ev.button]);
            if (ok === 1) return true;
          }

          if (type === "pointercancel") {
            const ok = callC(fn, "number", ["number"], [ev.pointerId]);
            if (ok === 1) return true;
          }
        } catch (err) {
          console.warn("Bridge forward failed:", err);
        }

        return dispatchDomFallbackToSDL(overlayCanvas, ev);
      }

      function consumeEvent(ev) {
        ev.preventDefault();
        ev.stopPropagation();
        ev.stopImmediatePropagation();
      }

      function routeOverlayPointerDown(ev, overlay) {
        const inside = pointInsideOverlayCssRect(overlay, ev.clientX, ev.clientY);
        const opaque = inside && isOpaqueAtClientPoint(overlay.canvas, ev.clientX, ev.clientY, 1);

        if (opaque) {
          activePointers.set(ev.pointerId, { owner: "rive", overlay });
          return;
        }

        activePointers.set(ev.pointerId, { owner: "sdl", overlay });

        try {
          overlay.canvas.setPointerCapture(ev.pointerId);
        } catch (_) {}

        consumeEvent(ev);
        forwardToSDLViaBridge("pointerdown", ev, overlay.canvas);
      }

      function routeOverlayPointerMove(ev, overlay) {
        const state = activePointers.get(ev.pointerId);
        if (!state) return;

        if (state.owner === "rive") {
          return;
        }

        consumeEvent(ev);
        forwardToSDLViaBridge("pointermove", ev, overlay.canvas);
      }

      function routeOverlayPointerUp(ev, overlay) {
        const state = activePointers.get(ev.pointerId);
        if (!state) return;

        if (state.owner === "rive") {
          activePointers.delete(ev.pointerId);
          return;
        }

        consumeEvent(ev);
        forwardToSDLViaBridge("pointerup", ev, overlay.canvas);

        activePointers.delete(ev.pointerId);

        try {
          if (overlay.canvas.hasPointerCapture(ev.pointerId)) {
            overlay.canvas.releasePointerCapture(ev.pointerId);
          }
        } catch (_) {}
      }

      function routeOverlayPointerCancel(ev, overlay) {
        const state = activePointers.get(ev.pointerId);
        if (!state) return;

        if (state.owner === "rive") {
          activePointers.delete(ev.pointerId);
          return;
        }

        consumeEvent(ev);
        forwardToSDLViaBridge("pointercancel", ev, overlay.canvas);

        activePointers.delete(ev.pointerId);

        try {
          if (overlay.canvas.hasPointerCapture(ev.pointerId)) {
            overlay.canvas.releasePointerCapture(ev.pointerId);
          }
        } catch (_) {}
      }

      function refreshLayout() {
        refreshRiveOverlayLayout(startButtonOverlay);
      }

      function watchDevicePixelRatio(onChange) {
        let mq = null;

        function bind() {
          if (mq) mq.removeEventListener("change", bind);
          mq = window.matchMedia(`(resolution: ${window.devicePixelRatio}dppx)`);
          mq.addEventListener("change", bind);
          onChange();
        }

        bind();
      }

      function createStartButtonOverlay() {
        const root = document.getElementById("overlay-root");
        const canvas = document.createElement("canvas");
        canvas.className = "rive-overlay";
        root.appendChild(canvas);

        const overlay = {
          x: 215,
          y: 1173,
          w: 650,
          h: 234,
          canvas,
          rive: null
        };

        const riveInstance = new rive.Rive({
          src: "assets/start-button.riv?v=" + Date.now(),
          artboard: "Start Button",
          stateMachines: "State Machine 1",
          canvas,
          autoplay: true,
          layout: new rive.Layout({
            fit: rive.Fit.Cover,
            alignment: rive.Alignment.Center
          }),
          onLoad: () => {
            console.log("Rive loaded OK");
            refreshRiveOverlayLayout(overlay);
          },
          onLoadError: (err) => {
            console.error("Rive load error:", err);
          }
        });

        overlay.rive = riveInstance;

        canvas.addEventListener("pointerdown", (ev) => routeOverlayPointerDown(ev, overlay), true);
        canvas.addEventListener("pointermove", (ev) => routeOverlayPointerMove(ev, overlay), true);
        canvas.addEventListener("pointerup", (ev) => routeOverlayPointerUp(ev, overlay), true);
        canvas.addEventListener("pointercancel", (ev) => routeOverlayPointerCancel(ev, overlay), true);

        refreshRiveOverlayLayout(overlay);
        return overlay;
      }

      window.addEventListener("resize", refreshLayout);
      watchDevicePixelRatio(refreshLayout);

      ensureProgressLoop();

      var Module = {
        canvas: sdlCanvas,

        locateFile: function(path, prefix) {
          if (path.endsWith(".wasm")) {
            return prefix + WASM_NAME;
          }
          return prefix + path;
        },

        setStatus: function(text) {
          if (!text) return;

          const match = text.match(/\((\d+(?:\.\d+)?)\/(\d+(?:\.\d+)?)\)/);
          if (match) {
            const current = parseFloat(match[1]);
            const total = parseFloat(match[2]);
            if (total > 0) {
              realPercent = Math.max(realPercent, Math.round((current / total) * 100));
              targetPercent = realPercent;
            }
          }

          if (!runtimeReady) {
            setLoadingDetail(text.replace(/\s*\(\d+(?:\.\d+)?\/\d+(?:\.\d+)?\)\s*/, ""));
          }
        },

        monitorRunDependencies: (function () {
          let maxDependencies = 0;

          return function (left) {
            maxDependencies = Math.max(maxDependencies, left);
            dependenciesTotal = maxDependencies;

            if (maxDependencies > 0) {
              const done = maxDependencies - left;
              const percent = Math.round((done / maxDependencies) * 100);

              realPercent = Math.max(realPercent, percent);
              targetPercent = left === 0 ? 90 : Math.max(targetPercent, percent);

              if (left > 0) {
                setLoadingDetail(`Starting app (${done}/${maxDependencies})`);
              } else {
                setLoadingDetail("Finalizing startup…");
              }
            }
          };
        })(),

        onRuntimeInitialized: function() {
          runtimeReady = true;
          targetPercent = 100;
          realPercent = 100;
          setLoadingDetail("");

          console.log("SDL/WASM runtime ready");
          startButtonOverlay = createStartButtonOverlay();
        },

        onAbort: function(reason) {
          cancelAnimationFrame(rafId);
          rafId = 0;
          setBarPercent(fakePercent);
          setLoadingText("Could not start app");
          setLoadingDetail(String(reason || "Unknown error"));
          console.error("Abort:", reason);
        },

        print: function(text) {
          console.log(text);
        },

        printErr: function(text) {
          console.error(text);
        }
      };

      window.Module = Module;
    })();
  </script>

  <script async type="text/javascript" src="kasino.138dd33.js"></script>
</body>
</html>
